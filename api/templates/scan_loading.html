<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scanning Network...</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap");
    :root {
      --ink: #162744;
      --muted: #66809f;
      --line: #d8e6f5;
      --panel: rgba(255,255,255,.82);
      --aqua: #5fd0e7;
      --cyan: #2cb7d3;
      --bg: #f7fbff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1400px 700px at -15% -18%, rgba(80, 198, 230, 0.18), transparent 55%),
        radial-gradient(1000px 650px at 110% 4%, rgba(107, 190, 238, 0.15), transparent 50%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 26px 24px;
      box-shadow: 0 25px 50px rgba(17, 47, 90, 0.12);
      text-align: center;
      backdrop-filter: blur(6px);
    }
    .spinner {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      margin: 0 auto 14px;
      border: 8px solid rgba(92, 186, 220, 0.22);
      border-top-color: #2cb7d3;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 0 8px rgba(97, 208, 231, 0.12);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { margin: 0; font-size: clamp(34px, 5vw, 52px); }
    .sub { margin: 8px auto 14px; color: var(--muted); font-size: clamp(16px, 2.1vw, 24px); max-width: 620px; line-height: 1.4; }
    .status {
      margin: 8px auto 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #cbe0f4;
      background: #ffffff;
      color: #204369;
      font-size: 14px;
      min-height: 46px;
      display: grid;
      align-content: center;
    }
    .mini-log {
      text-align: left;
      background: #fff;
      border: 1px solid #d7e6f7;
      border-radius: 12px;
      padding: 10px;
      max-height: 150px;
      overflow: auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      color: #1e3f66;
      white-space: pre-wrap;
    }
    .actions { margin-top: 12px; }
    .btn {
      display: inline-block;
      text-decoration: none;
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      margin: 0 5px 6px;
      cursor: pointer;
    }
    .btn.primary { color: #f5fdff; background: linear-gradient(130deg, var(--aqua), var(--cyan)); }
    .btn.secondary { color: #fff; background: #2b4f79; }
    .ok { color: #0f7b4a; font-weight: 700; }
    .bad { color: #b12d27; font-weight: 700; }
  </style>
</head>
<body>
  <section class="card">
    <div class="spinner"></div>
    <h1>Scanning Network</h1>
    <p class="sub">Please wait while IoT Scanner discovers hosts, checks security signals, and prepares your dashboard.</p>
    <div id="statusText" class="status">Waiting for scan status...</div>
    <div id="logBox" class="mini-log">No log yet.</div>
    <div class="actions">
      <a class="btn secondary" href="/">Back Home</a>
      <a class="btn secondary" href="/dashboard">Open Dashboard</a>
    </div>
  </section>

  <script>
    (function () {
      const keyRequired = {{ "true" if api_key_required else "false" }};
      const statusText = document.getElementById("statusText");
      const logBox = document.getElementById("logBox");
      let sawRunning = false;

      async function tick() {
        try {
          const apiKey = (sessionStorage.getItem("iot_admin_api_key") || "").trim();
          if (keyRequired && !apiKey) {
            statusText.innerHTML = '<span class="bad">Admin API key missing. Go back and start scan with a valid key.</span>';
            return;
          }
          const headers = {};
          if (apiKey) headers["X-API-Key"] = apiKey;
          const res = await fetch("/api/scan/status", { headers });
          if (res.status === 401) {
            statusText.innerHTML = '<span class="bad">Unauthorized: invalid Admin API key.</span>';
            return;
          }
          if (!res.ok) {
            statusText.textContent = `Unable to fetch scan status (${res.status}).`;
            return;
          }
          const data = await res.json();

          const state = data.last_status || "idle";
          const running = !!data.running;
          const cidr = data.cidr ? ` (${data.cidr})` : "";
          const mode = data.scan_mode ? ` mode=${data.scan_mode}` : "";
          const profile = data.discovery_profile ? ` profile=${data.discovery_profile}` : "";
          const checkProfile = data.check_profile ? ` checks=${data.check_profile}` : "";

          if (running) {
            sawRunning = true;
            statusText.innerHTML = `Status: <b>${state}</b>${cidr}${mode}${profile}${checkProfile}. Scan is in progress...`;
          } else if (state === "success") {
            statusText.innerHTML = `<span class="ok">Scan completed successfully${cidr}${mode}${profile}${checkProfile}. Redirecting to dashboard...</span>`;
            setTimeout(() => { window.location.href = "/dashboard"; }, 900);
            return;
          } else if (state === "failed") {
            statusText.innerHTML = `<span class="bad">Scan failed${cidr}${mode}${profile}${checkProfile}. Check logs below.</span>`;
          } else if (!sawRunning) {
            statusText.textContent = "Waiting for scan to start...";
          } else {
            statusText.textContent = `Status: ${state}${cidr}`;
          }

          const lines = data.log_tail || [];
          logBox.textContent = lines.length ? lines.join("\n") : "No log yet.";
        } catch (e) {
          statusText.textContent = "Unable to fetch scan status.";
        }
      }

      tick();
      setInterval(tick, 2500);
    }());
  </script>
</body>
</html>
